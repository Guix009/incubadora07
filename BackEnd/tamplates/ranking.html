<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ranking de Ideias</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">Incubadora Nissan</div>
    <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/formulario">Formulário</a></li>
        <li><a href="/ranking">Ranking</a></li>
        <li><a href="/contato">Contato</a></li>
    </ul>
</nav>

<main>
    <div class="page-header">
        <h2>Ranking de Ideias</h2>
        <p>Ideias aprovadas com maior impacto</p>
    </div>

    <div class="ranking-container">
        <div id="ranking" class="ranking-list"></div>
    </div>
</main>

<footer class="footer">
    © 2026 Nissan - Paint Shop Performance
</footer>

<script>
fetch("/api/ideias")
.then(r => r.json())
.then(data => {
    const aprovadas = data
        .filter(i => i.status === "Aprovada")
        .sort((a,b) => b.pontuacao - a.pontuacao);

    const ranking = document.getElementById("ranking");
    ranking.innerHTML = "";

    if (!aprovadas.length) {
        ranking.innerHTML = "<p>Nenhuma ideia aprovada.</p>";
        return;
    }

    aprovadas.forEach((i, idx) => {
        ranking.innerHTML += `
        <div class="ranking-card">
            <span class="badge">${idx+1}º</span>
            <div>
                <h4>${i.descricao}</h4>
                <p>${i.nome} • ${i.area}</p>
                <strong>Pontuação: ${i.pontuacao}</strong>
            </div>
        </div>`;
    });
});
</script>

</body>
</html>
