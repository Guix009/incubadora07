<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Enviar Ideia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">Incubadora Nissan</div>
    <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/formulario">Formulário</a></li>
        <li><a href="/ranking">Ranking</a></li>
        <li><a href="/contato">Contato</a></li>
    </ul>
</nav>

<main>
    <div class="page-header">
        <h2>Enviar Ideia</h2>
        <p>Preencha os campos abaixo</p>
    </div>

    <div class="page-content">
        <form class="form-ideia">

            <div class="form-group">
                <label>Nome</label>
                <input id="nome" required>
            </div>

            <div class="form-group">
                <label>Matrícula</label>
                <input id="matricula" required>
            </div>

            <div class="form-group">
                <label>Área</label>
                <select id="area" required>
                    <option value="">Selecione</option>
                    <option>Paint Shop</option>
                    <option>Qualidade</option>
                    <option>Manutenção</option>
                </select>
            </div>

            <div class="form-group">
                <label>Supervisor</label>
                <select id="supervisor" required>
                    <option value="">Selecione</option>
                    <option>Ana Serra</option>
                    <option>Gabriel Santiago</option>
                    <option>Sandro Santos</option>
                    <option>Marcelo André</option>
                    <option>Marcus Sampaio</option>
                    <option>Juliano Rodrigues</option>
                    <option>Rodrigo</option>
                    <option>Diego Nicolino</option>
                    <option>Bruna Carvalho</option>
                </select>
            </div>

            <div class="form-group">
                <label>Descrição da Ideia</label>
                <textarea id="descricao" required></textarea>
            </div>

            <button class="btn btn-full">Enviar Ideia</button>
        </form>
    </div>
</main>

<footer class="footer">
    © 2026 Nissan - Paint Shop Performance
</footer>

<script>
document.querySelector("form").addEventListener("submit", async e => {
    e.preventDefault();

    const data = {
        nome: nome.value,
        matricula: matricula.value,
        area: area.value,
        supervisor: supervisor.value,
        descricao: descricao.value
    };

    const res = await fetch("/api/ideias", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    if (res.ok) {
        alert("✅ Ideia enviada com sucesso!");
        e.target.reset();
    }
});
</script>

</body>
</html>
