<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Enviar Ideia</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<nav class="navbar">
    <div class="logo">Incubadora Nissan</div>
    <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/formulario">Formulário</a></li>
        <li><a href="/ranking">Ranking</a></li>
        <li><a href="/contato">Contato</a></li>
    </ul>
</nav>

<main>
    <div class="page-header">
        <h2>Enviar Ideia</h2>
        <p>Preencha os campos abaixo para registrar sua ideia</p>
    </div>

    <div class="page-content">
        <form class="form-ideia">

            <div class="form-group">
                <label for="nome">Nome</label>
                <input type="text" id="nome" required>
            </div>

            <div class="form-group">
                <label for="matricula">Matrícula</label>
                <input type="text" id="matricula" required>
            </div>

            <div class="form-group">
                <label for="area">Área</label>
                <select id="area" required>
                    <option value="">Selecione a área</option>
                    <option>Paint Shop</option>
                    <option>Qualidade</option>
                    <option>Manutenção</option>
                </select>
            </div>

            <div class="form-group">
                <label for="supervisor">Supervisor</label>
                <select id="supervisor" required>
                    <option value="">Selecione</option>
                    <option>Ana Serra</option>
                    <option>Gabriel Santiago</option>
                    <option>Sandro Santos</option>
                    <option>Marcelo André</option>
                    <option>Marcus Sampaio</option>
                    <option>Juliano Rodrigues</option>
                    <option>Rodrigo</option>
                    <option>Diego Nicolino</option>
                    <option>Bruna Carvalho</option>
                </select>
            </div>

            <div class="form-group">
                <label for="descricao">Descrição da Ideia</label>
                <textarea id="descricao" required></textarea>
            </div>

            <button type="submit" class="btn btn-full">
                Enviar Ideia
            </button>

        </form>
    </div>
</main>

<footer class="footer">
    <p>© 2026 Nissan - Paint Shop Performance</p>
</footer>

<script>
document.querySelector("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        nome: nome.value,
        matricula: matricula.value,
        area: area.value,
        supervisor: supervisor.value,
        descricao: descricao.value
    };

    const response = await fetch("/api/ideias", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    if (response.ok) {
        alert("✅ Ideia enviada com sucesso!");
        this.reset();
    }
});
</script>

</body>
</html>
